specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PredictionMarket
    network: arbitrum-sepolia
    source:
      address: "0xc95dE1BAFabE53B2c9a743a4425296Ce4293530e"
      abi: PredictionMarket
      startBlock: 268899076
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
      abis:
        - name: PredictionMarket
          file: ./abis/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,indexed address,string,uint256)
          handler: handleMarketCreated
        - event: MarketResolved(indexed uint256,bool)
          handler: handleMarketResolved
        - event: MarketCancelled(indexed uint256)
          handler: handleMarketCancelled
        - event: SharesRedeemed(indexed uint256,indexed address,uint256,uint256)
          handler: handleSharesRedeemed
      file: ./mappings/market.ts

  - kind: ethereum
    name: MarketAMM
    network: arbitrum-sepolia
    source:
      address: "0xB4d820DD5cD9A5c2eE92AdA161D48c4Ce5cb9dD6"
      abi: MarketAMM
      startBlock: 268899083
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Trade
        - LiquidityPosition
      abis:
        - name: MarketAMM
          file: ./abis/MarketAMM.json
      eventHandlers:
        - event: Swap(indexed address,bool,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
      file: ./mappings/amm.ts

  - kind: ethereum
    name: MyGovernor
    network: arbitrum-sepolia
    source:
      address: "0x61E3585B25F8FDEaa127264Bc08f8fc335D92ce2"
      abi: MyGovernor
      startBlock: 268899049
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - GovernanceProposal
      abis:
        - name: MyGovernor
          file: ./abis/MyGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
      file: ./mappings/governor.ts
