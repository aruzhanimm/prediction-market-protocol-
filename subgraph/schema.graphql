type Market @entity(immutable: false) {
  id: ID!
  marketId: BigInt!
  creator: Bytes!
  question: String!
  resolutionTime: BigInt!
  status: String!
  outcome: Boolean
  totalShares: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}

type Trade @entity(immutable: false) {
  id: ID!
  market: String!
  trader: Bytes!
  buyYes: Boolean!
  amountIn: BigInt!
  amountOut: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
  blockNumber: BigInt!
}

type LiquidityPosition @entity(immutable: false) {
  id: ID!
  market: String!
  provider: Bytes!
  lpTokens: BigInt!
  yesDeposited: BigInt!
  noDeposited: BigInt!
  lastUpdated: BigInt!
}

type GovernanceProposal @entity(immutable: false) {
  id: ID!
  proposalId: BigInt!
  proposer: Bytes!
  description: String!
  state: String!
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  eta: BigInt
  startBlock: BigInt!
  endBlock: BigInt!
  createdAt: BigInt!
  txHash: Bytes!
}